name: Publish to npm

on:
  push:
    tags:
      - '*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run unit tests
        run: yarn test

      - name: Build package
        run: yarn build

      - name: Debug OIDC token exchange
        run: |
          OIDC_TOKEN=$(curl -sS "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm" \
            -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" | jq -r .value)
          echo "OIDC token obtained: ${#OIDC_TOKEN} chars"
          curl -sS -X POST https://registry.npmjs.org/-/npm/v1/oidc/token \
            -H "Content-Type: application/json" \
            -d "{\"token\": \"$OIDC_TOKEN\"}"

      - name: Publish to npm
        run: npm publish --provenance --access public
